<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 500;
    color: #8888aa;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  #status-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 3px solid #222;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #status-ring.idle    { border-color: #333; }
  #status-ring.listening  { border-color: #4af; box-shadow: 0 0 30px rgba(68,170,255,0.3); }
  #status-ring.thinking   { border-color: #fa4; box-shadow: 0 0 30px rgba(255,170,68,0.3); }
  #status-ring.speaking   { border-color: #4f8; box-shadow: 0 0 30px rgba(68,255,136,0.3); }
  #status-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
  }
  #start-btn {
    margin: 1.5rem 0;
    padding: 0.8rem 2.5rem;
    background: #2a2a3a;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #start-btn:hover { background: #3a3a4a; }
  #start-btn.active { background: #a33; border-color: #c44; color: #fff; }
  .panel {
    width: 100%; max-width: 600px;
    margin-top: 1rem;
    padding: 1rem 1.2rem;
    background: #12121a;
    border: 1px solid #222;
    border-radius: 10px;
  }
  .panel-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-bottom: 0.6rem;
  }
  .panel-content {
    font-size: 0.95rem;
    line-height: 1.6;
    min-height: 1.6em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #transcript-content { color: #7af; }
  #response-content { color: #ddd; }
</style>
</head>
<body>
  <h1>Voice Agent</h1>

  <div id="status-ring" class="idle">
    <span id="status-label">IDLE</span>
  </div>

  <button id="start-btn" onclick="toggleVoice()">Start</button>

  <div class="panel">
    <div class="panel-title">You said</div>
    <div class="panel-content" id="transcript-content"></div>
  </div>

  <div class="panel">
    <div class="panel-title">AI response</div>
    <div class="panel-content" id="response-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
