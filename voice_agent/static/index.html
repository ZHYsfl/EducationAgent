<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main Container -->
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-left">
          <h1 class="app-title">Voice Agent</h1>
          <div class="status-badge">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Idle</span>
          </div>
        </div>
        <button class="btn-primary" id="start-btn">Start</button>
      </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-main" id="chat-container">
      <div class="chat-empty" id="chat-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Start a conversation</p>
      </div>
    </main>

    <!-- Requirements Card Modal -->
    <div class="modal-overlay hidden" id="requirements-modal">
      <div class="modal-card">
        <div class="modal-header">
          <h2>课件需求确认</h2>
          <div class="progress-text" id="progress-text">已收集 12/12 个字段</div>
        </div>
        <div class="modal-body">
          <div class="req-grid">
            <div class="req-item"><label>主题</label><span id="req-topic"></span></div>
            <div class="req-item"><label>学科</label><span id="req-subject"></span></div>
            <div class="req-item"><label>目标受众</label><span id="req-audience"></span></div>
            <div class="req-item"><label>页数</label><span id="req-pages"></span></div>
            <div class="req-item"><label>知识点</label><span id="req-focus"></span></div>
            <div class="req-item"><label>教学目标</label><span id="req-goals"></span></div>
            <div class="req-item"><label>讲授逻辑</label><span id="req-logic"></span></div>
            <div class="req-item"><label>重点难点</label><span id="req-difficulty"></span></div>
            <div class="req-item"><label>课时长度</label><span id="req-duration"></span></div>
            <div class="req-item"><label>全局风格</label><span id="req-style"></span></div>
            <div class="req-item"><label>互动设计</label><span id="req-interactive"></span></div>
            <div class="req-item"><label>输出格式</label><span id="req-formats"></span></div>
            <div class="req-item full-width"><label>补充说明</label><span id="req-notes"></span></div>
          </div>
        </div>
        <div class="modal-footer">
          <p class="voice-hint">💬 请语音确认或提出修改意见</p>
        </div>
      </div>
    </div>

    <!-- Event Log -->
    <footer class="app-footer">
      <button class="log-toggle" id="log-toggle">
        <span class="log-arrow" id="log-arrow">›</span>
        Event Log
      </button>
      <div class="log-content hidden" id="log-content"></div>
    </footer>
  </div>

  <script src="ort.min.js"></script>
  <script>ort.env.wasm.wasmPaths = "/";</script>
  <script src="vad-web.min.js"></script>
  <script>window.vad_web=window.vad_web||window.vad;</script>
  <script src="app.js"></script>
</body>
</html>
